services:
  postgres-test:
    image: postgres:16
    container_name: bitboard-postgres-test
    restart: "no"
    environment:
      POSTGRES_USER: bitboard
      POSTGRES_PASSWORD: bitboard
      POSTGRES_DB: bitboard_test
    ports:
      - "15432:5432"
    volumes:
      - bitboard-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitboard -d bitboard_test"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  bitboard-test-data:
